name: study_voice
description: AI-powered offline study assistant that converts PDFs, images and text into natural English and Tamil speech.
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^17.3.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities & Services
  path_provider: ^2.1.3
  file_picker: ^11.0.2
  image_picker: ^1.1.2
  flutter_tts: ^4.2.2
  google_mlkit_text_recognition: ^0.15.1
  syncfusion_flutter_pdf: ^33.2.13
  syncfusion_flutter_pdfviewer: ^33.2.13
  intl: ^0.20.2

  # Model Generation Annotations
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  freezed: ^2.4.7
  json_serializable: ^6.7.1

  # Linting
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/illustrations/
    - assets/fonts/
    - assets/animations/
    - assets/audio/